<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Consultar pedido por ID</title>
     <link rel="icon" type="image/x-icon" href="pets.png">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet" />

  <style>
    :root{
      color-scheme: light;
      --bg: #f7efe5;
      --bg-card: #ffffff;
      --bg-header: #e6d7c3;
      --text: #5a4632;
      --text-muted: #7d6a53;
      --brand: #b99672;
      --brand-dark: #5a4632;
      --border: #e5e7eb;

      --success-bg: #e6f6ec;
      --success-fg: #0a7d34;
      --danger-bg: #fdecec;
      --danger-fg: #a10d11;

      --card-muted: #f4eee7;
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family:"Poppins",sans-serif;
      background:var(--bg);
      color:var(--text);
      line-height:1.5;
        /* ✅ Fondo con tu imagen */
  background-image: url("https://www.shutterstock.com/image-vector/dog-paw-bone-seamless-vector-600nw-2465714911.jpg");
  background-repeat: repeat;       /* 🔁 se repite */
  background-size: auto;           /* mantiene el tamaño real */
  background-position: top left;   /* empieza desde la esquina */
    }

    /* ================= HEADER (igual estilo que los otros) ================ */
    .header{
      position:sticky; top:0; z-index:10;
      background:var(--bg-header);
      border-bottom:1px solid var(--border);
      padding:.5rem 0;
      box-shadow:0 2px 8px rgba(0,0,0,.08);
      backdrop-filter:saturate(180%) blur(6px);
    }
    .nav{
      max-width:1200px;
      margin:0 auto;
      padding:.9rem 1rem;
      display:grid;
      grid-template-columns:1fr auto;
      align-items:center;
      gap:.75rem;
    }
    .brand a{
      font-weight:700;
      font-size:1.2rem;
      color:var(--brand-dark);
      text-decoration:none;
    }
    .brand a:hover{
      text-decoration:underline;
    }
    .links{
      display:flex;
      gap:.5rem;
    }
    .links a{
      text-decoration:none;
      padding:.55rem .8rem;
      background:var(--brand);
      color:white;
      font-weight:600;
      border-radius:.6rem;
      box-shadow:0 1px 0 rgba(0,0,0,.03);
      transition:.15s;
    }
    .links a:hover{
      transform:translateY(-1px);
      box-shadow:0 6px 14px rgba(0,0,0,.08);
    }

    /* ================= RESTO DEL CÓDIGO (igual que tu versión) ================ */
    main{ padding:1.25rem; }
    .card{
      max-width:900px; margin:0 auto;
      background:white;
      border:1px solid var(--border);
      border-radius:14px;
      box-shadow:0 8px 20px rgba(0,0,0,.06);
      padding:1.25rem;
    }
    h1{ margin:0 0 .35rem; font-size:1.6rem; }
    .sub{ color:var(--text-muted); margin:.25rem 0 1rem; }

    fieldset{
      border:1px solid var(--border);
      border-radius:12px;
      padding:1rem;
      background:white;
      margin-bottom:1.25rem;
    }
    legend{ font-weight:700; color:var(--brand-dark); }
    label{ display:block; margin-bottom:.35rem; font-weight:600; }

    input{
      width:100%; padding:.65rem .7rem;
      border:1px solid var(--border);
      border-radius:.6rem;
      font-size:1rem;
    }
    input:focus{
      border-color:#d8c6b1;
      box-shadow:0 0 0 3px rgba(185,150,114,.25);
    }

    .actions{ display:flex; gap:.6rem; flex-wrap:wrap; margin-top:.75rem; }

    .btn{
      padding:.7rem 1.05rem;
      border:0;
      border-radius:.7rem;
      background:var(--brand);
      color:white;
      font-weight:700;
      cursor:pointer;
      transition:.15s;
      box-shadow:0 4px 10px rgba(185,150,114,.25);
    }
    .btn:hover{
      transform:translateY(-1px);
      box-shadow:0 8px 18px rgba(185,150,114,.32);
    }
    .btn.ghost{
      background:transparent;
      border:1px solid #d8c6b1;
      color:var(--brand-dark);
    }

    .bar{
      display:flex; justify-content:space-between; align-items:center;
      background:var(--card-muted);
      border:1px solid var(--border);
      border-radius:12px;
      padding:.65rem .8rem;
      margin:.75rem 0;
    }
    .ok{ color:var(--success-fg); font-weight:700; }
    .err{ color:var(--danger-fg); font-weight:700; }
    .note{ color:var(--text-muted); }

    .result-card{
      padding:1rem;
      background:white;
      border:1px solid var(--border);
      border-radius:12px;
      box-shadow:0 4px 12px rgba(0,0,0,.04);
    }
    .kv{
      display:grid;
      grid-template-columns:120px 1fr;
      gap:.25rem .6rem;
    }

    footer.site{
      max-width:900px;
      margin:1.5rem auto 0;
      padding:1rem;
      text-align:center;
      background:var(--bg-header);
      border-top:1px solid var(--border);
      border-radius:12px;
    }

    /* Modal */
    .modal{
      position:fixed; inset:0;
      background:rgba(0,0,0,.5);
      display:none;
      align-items:center;
      justify-content:center;
      padding:1rem;
    }
    .modal.open{ display:flex; }
    .modal-box{
      background:white;
      border-radius:14px;
      width:min(960px,95vw);
      max-height:90vh;
      overflow:auto;
      border:1px solid var(--border);
      box-shadow:0 8px 30px rgba(0,0,0,.2);
    }
    .modal-head{
      padding:.8rem 1rem;
      border-bottom:1px solid var(--border);
      display:flex; justify-content:space-between; align-items:center;
    }
    .close-x{
      background:transparent;
      border:0;
      font-size:1.2rem;
      cursor:pointer;
      color:var(--brand-dark);
    }
    .modal-body pre{
      margin:0; padding:1rem;
      background:#151212;
      color:#efeae4;
    }
  </style>
</head>

<body>

<!-- ================= HEADER FINAL ================= -->
<header class="header">
  <nav class="nav">
    <div class="brand">
      <a href="main-index.html">Tienda de Mascotas</a>
      <img src="icon.png" alt="Icono tienda"
         style="width:38px; height:38px; object-fit:contain;">
    </div>

    <div class="links">
      <a href="./inventario.html">Inventario</a>
    </div>
  </nav>
</header>

<main>
  <div class="card">
    <h1>Consultar pedido por ID🔍</h1>
    <!-- <p class="sub">Para obtener una respuesta válida, usa IDs ≤ 5 o ≥ 11.</p> -->

    <form id="form">
      <fieldset>
        <legend>Introduce Identificador</legend>
        <label for="orderId">ID del pedido *</label>
        <input id="orderId" type="number" min="1" required placeholder="Ej. 1" />

        <div class="actions">
          <button type="submit" class="btn">Buscar pedido</button>
          <!-- <button type="button" id="btnExamples" class="btn ghost">IDs de ejemplo</button> -->
          <span id="info" class="note"></span>
        </div>
      </fieldset>
    </form>

    <div id="bar" class="bar" style="display:none">
      <div id="httpStatus"></div>
      <div id="lastUrl" class="note"></div>
    </div>

    <div id="resultCard" class="result-card" style="display:none">
      <h3>Pedido</h3>
      <div class="kv" id="kv"></div>
      <div class="actions" style="margin-top:.6rem">
        <button type="button" id="viewJsonBtn" class="btn ghost">Ver JSON</button>
      </div>
    </div>

    <!-- <p class="muted" id="hint" style="display:none; margin-top:.75rem">
      📌 Sugerencia: prueba IDs 1, 2, 3, 4, 5 o 11+
    </p> -->
  </div>

  <footer class="site">
    <small>© 2026 Tienda de Mascotas. Todos los derechos reservados.</small>
  </footer>
</main>

<!-- Modal -->
<div id="modal" class="modal">
  <div class="modal-box">
    <div class="modal-head">
      <strong id="modalTitle">JSON</strong>
      <button id="modalClose" class="close-x">✕</button>
    </div>
    <div id="modalBody" class="modal-body"></div>
  </div>
</div>

<script>
    // ===== Config y utilidades =====
    const API_BASE = "https://petstore3.swagger.io/api/v3/store/order";
    const $ = (id) => document.getElementById(id);

    const form = $("form");
    const inputId = $("orderId");
    const info = $("info");
    const bar = $("bar");
    const httpStatus = $("httpStatus");
    const lastUrl = $("lastUrl");
    const resultCard = $("resultCard");
    const kv = $("kv");
    const hint = $("hint");
    const btnExamples = $("btnExamples");

    const modal = $("modal");
    const modalTitle = $("modalTitle");
    const modalBody = $("modalBody");
    $("modalClose").addEventListener("click", closeModal);
    modal.addEventListener("click", (e)=>{ if(e.target===modal) closeModal(); });
    document.addEventListener("keydown", (e)=>{ if(e.key==="Escape") closeModal(); });
    function closeModal(){ modal.classList.remove("open"); modalBody.innerHTML = ""; }
    function openModalJSON(obj, title="JSON"){
      modalTitle.textContent = title;
      const pretty = JSON.stringify(obj, null, 2);
      modalBody.innerHTML = '<pre>'+escapeHtml(pretty)+'</pre>';
      modal.classList.add("open");
    }
    function escapeHtml(v){
      return String(v ?? "")
        .replace(/&/g,"&amp;").replace(/</g,"&lt;")
        .replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
    }

    function setBar(ok, statusCode, url){
      bar.style.display = "flex";
      httpStatus.innerHTML = ok ? `<span class="ok">HTTP ${statusCode}</span>` : `<span class="err">HTTP ${statusCode}</span>`;
      lastUrl.textContent = url;
    }

    function renderOrder(order){
      resultCard.style.display = "block";
      const rows = [
        ["Order ID", order.id],
        ["Pet ID", order.petId],
        ["Cantidad", order.quantity],
        ["Estado", order.status ?? "—"],
        ["Completo", String(order.complete)],
        ["shipDate", order.shipDate ?? "—"],
      ];
      kv.innerHTML = rows.map(([k, v]) => `<div>${escapeHtml(k)}</div><div>${escapeHtml(String(v))}</div>`).join("");
      $("viewJsonBtn").onclick = () => openModalJSON(order, `Pedido #${order.id ?? ""}`);
    }

    // btnExamples.addEventListener("click", () => {
    //   hint.style.display = "block";
    //   // Rellena un ejemplo válido alternando valores
    //   const samples = [1, 2, 3, 4, 5, 11, 12, 13];
    //   const pick = samples[Math.floor(Math.random()*samples.length)];
    //   inputId.value = pick;
    //   inputId.focus();
    // });

    form.addEventListener("submit", async (e)=>{
      e.preventDefault();
      info.textContent = "";
      resultCard.style.display = "none";

      const idVal = Number(inputId.value);
      if (!Number.isFinite(idVal) || idVal <= 0){
        bar.style.display = "flex";
        httpStatus.innerHTML = `<span class="err">ID inválido</span>`;
        lastUrl.textContent = "";
        return;
      }

      const url = `${API_BASE}/${encodeURIComponent(idVal)}?_=${Date.now()}`; // cache-buster
      setBar(true, "—", url);

      try{
        const res = await fetch(url, { method:"GET", headers: { "Accept": "application/json" }, cache: "no-store" });
        const txt = await res.text();
        let body; try{ body = JSON.parse(txt); }catch{ body = txt; }

        setBar(res.ok, res.status, url);

        if (res.ok && body && typeof body === "object" && !Array.isArray(body)){
          info.textContent = "Pedido encontrado ✔";
          renderOrder(body);
        } else if (res.status === 404){
          info.textContent = "Pedido no encontrado (404).";
        } else if (res.status === 400){
          info.textContent = "ID inválido (400).";
        } else {
          info.textContent = "La API respondió con un error.";
          // Muestra detalle para depurar
          openModalJSON(body, `Error HTTP ${res.status}`);
        }
      }catch(err){
        setBar(false, "error", url);
        info.textContent = "Falló la solicitud.";
        openModalJSON(String(err), "Excepción");
      }
    });
  </script>

</body>
</html>
