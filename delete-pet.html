<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Eliminar mascota</title>
  <link rel="icon" type="image/x-icon" href="pets.png" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet" />

  <style>
    :root{
      color-scheme: light;
      --bg: #f7efe5;
      --bg-card: #ffffff;
      --bg-header: #e6d7c3;
      --text: #5a4632;
      --text-muted: #7d6a53;
      --brand: #b99672;
      --brand-dark: #5a4632;
      --border: #e5e7eb;

      --success-bg: #e6f6ec;
      --success-fg: #0a7d34;
      --danger-bg: #fdecec;
      --danger-fg: #a10d11;

      --card-muted: #f4eee7;
    }

    /* Base */
    *{ box-sizing: border-box; }
    html, body { height: 100%; }
    body{
      margin: 0;
      font-family: "Poppins", system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;

      background-image: url("https://www.shutterstock.com/image-vector/dog-paw-bone-seamless-vector-600nw-2465714911.jpg");
      background-repeat: repeat;
      background-size: auto;
      background-position: top left;
    }

    /* Header / Nav */
    .header{
      position: sticky; top: 0; z-index: 10;
      background: var(--bg-header);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
      backdrop-filter: saturate(180%) blur(6px);
    }

    .nav{
      max-width: 1200px;
      margin: 0 auto;
      padding: .9rem 1rem;
      display: grid;
      grid-template-columns: 1fr;
      gap: .75rem;
      align-items: center;
    }
    @media (min-width: 860px){
      .nav{ grid-template-columns: 1fr auto; }
    }

    /* Brand: texto + icono alineados */
    .brand{
      display: inline-flex;
      align-items: center;
      gap: .6rem;
      min-width: 0;
    }
    .brand a{
      text-decoration: none;
      color: var(--brand-dark);
      font-weight: 700;
      letter-spacing: .3px;
      font-size: 1.15rem;
      white-space: nowrap;
    }
    .brand a:hover{ text-decoration: underline; }
    .brand img{
      width: 38px;
      height: 38px;
      object-fit: contain;
      flex: 0 0 auto;
    }

    .links{ display: flex; gap: .5rem; flex-wrap: wrap; align-items: center; }

    .nav a, .nav button{
      appearance: none;
      border: 0;
      text-decoration: none;
      cursor: pointer;
      padding: .55rem .8rem;
      border-radius: .6rem;
      font-weight: 600;
      box-shadow: 0 1px 0 rgba(0,0,0,.03);
      transition: transform .12s ease, box-shadow .2s ease, background .2s ease, color .2s ease, opacity .2s ease;
      border: 1px solid transparent;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
      color: var(--brand-dark);
    }
    .nav a:hover{
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(0,0,0,.08);
    }

    /* ✅ Botón único azul Acciones */
    .acciones{
      background: #0d6efd;
      color: #fff !important;
      border-color: transparent;
    }
    .acciones:hover{ opacity: .95; }

    /* Layout principal */
    main{ padding: 1.25rem; }
    @media (min-width: 860px){ main{ padding: 2rem; } }

    .card{
      max-width: 900px;
      margin: 0 auto;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 8px 20px rgba(0,0,0,.06);
      padding: 1.25rem;
    }
    @media (min-width: 860px){ .card{ padding: 1.5rem; } }

    h1{ margin: 0 0 .35rem; font-size: 1.6rem; }
    @media (min-width: 600px){ h1{ font-size: 1.85rem; } }
    .help{ color: var(--text-muted); margin: .25rem 0 1rem; }

    /* Formularios */
    fieldset{
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem;
      background: #fff;
      margin-bottom: 1.25rem;
    }
    legend{ font-weight: 700; padding: 0 .4rem; color: var(--brand-dark); }
    label{ display: block; font-weight: 600; margin-bottom: .35rem; }
    input{
      width: 100%;
      padding: .65rem .7rem;
      border: 1px solid var(--border);
      border-radius: .6rem;
      background: #fff;
      color: var(--text);
      transition: box-shadow .15s ease, border-color .15s ease;
      outline: none;
      font-size: 1rem;
    }
    input:focus{
      border-color: #d8c6b1;
      box-shadow: 0 0 0 3px rgba(185,150,114,.25);
    }

    /* Botones */
    button{
      padding: .7rem 1.05rem;
      border: 0;
      border-radius: .7rem;
      cursor: pointer;
      font-weight: 700;
      transition: transform .12s ease, box-shadow .2s ease, background .2s ease, opacity .2s ease;
    }
    button:disabled{ opacity: .6; cursor: not-allowed; transform: none; box-shadow: none; }

    .btn-primary{
      background: #b86666;
      color: #fff;
      box-shadow: 0 4px 10px rgba(184,102,102,.25);
    }
    .btn-primary:hover{
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(184,102,102,.32);
      opacity: .97;
    }

    .btn-ghost{
      background: transparent;
      color: var(--brand-dark);
      border: 1px solid #d8c6b1;
      box-shadow: 0 1px 0 rgba(0,0,0,.03);
    }
    .btn-ghost:hover{
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(0,0,0,.08);
    }

    /* Barra de resultado */
    .bar{
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: .75rem;
      margin: .6rem 0 1rem;
      border: 1px solid var(--border);
      background: var(--card-muted);
      border-radius: 12px;
      padding: .65rem .8rem;
    }
    .ok{ color: var(--success-fg); font-weight: 700; }
    .err{ color: var(--danger-fg); font-weight: 700; }
    .note{ color: var(--text-muted); font-size: .95rem; word-break: break-all; }

    /* Card resultado */
    .result-card{
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fff;
      padding: 1rem;
      max-width: 480px;
      box-shadow: 0 4px 12px rgba(0,0,0,.04);
    }
    .result-card h3{ margin: 0 0 .35rem; }
    .card-actions{ margin-top: .75rem; display: flex; gap: .5rem; flex-wrap: wrap; }

    /* Footer */
    footer.site{
      max-width: 900px;
      margin: 1.25rem auto 0;
      background: var(--bg-header);
      color: var(--text);
      border-top: 1px solid var(--border);
      border-radius: 12px;
      padding: .9rem 1rem;
      text-align: center;
    }
    footer small{ opacity: .85; }

    /* Modal */
    .modal{
      position: fixed; inset: 0;
      background: rgba(0,0,0,.5);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      z-index: 20;
    }
    .modal.open{ display: flex; }
    .modal-box{
      background: #fff;
      border-radius: 14px;
      width: min(960px, 95vw);
      max-height: 90vh;
      overflow: auto;
      box-shadow: 0 8px 30px rgba(0,0,0,.2);
      border: 1px solid var(--border);
    }
    .modal-head{
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: .8rem 1rem;
      border-bottom: 1px solid var(--border);
    }
    .modal-body{ padding: 0; }
    .modal-body pre{
      margin: 0;
      padding: 1rem;
      background: #151212;
      color: #efeae4;
      border-radius: 0;
      overflow: auto;
    }
    .close-x{
      background: transparent;
      border: 0;
      font-size: 1.2rem;
      cursor: pointer;
      color: var(--brand-dark);
    }
  </style>
</head>

<body>
  <header class="header" role="banner">
    <nav class="nav" aria-label="Navegación principal">
      <div class="brand">
        <a href="main-index.html">Tienda de Mascotas</a>
        <img src="icon.png" alt="Icono tienda" />
      </div>

      <!-- ✅ SOLO UN BOTÓN -->
      <div class="links">
        <a class="acciones" href="./acciones.html">Acciones</a>
      </div>
    </nav>
  </header>

  <main>
    <div class="card">
      <h1>Eliminar mascota por ID</h1>

      <form id="deleteForm">
        <fieldset>
          <label for="petId">Identificador de Mascota *</label>
          <input id="petId" type="number" min="1" required placeholder="Ej. 10" />

          <div style="margin-top:1rem">
            <button id="deleteBtn" type="submit" class="btn-primary">Eliminar mascota</button>
          </div>
        </fieldset>
      </form>

      <!-- Estado de la solicitud -->
      <div id="resultBar" class="bar" aria-live="polite" style="display:none"></div>

      <!-- Resultado visual -->
      <div id="cardContainer"></div>
    </div>

    <footer class="site">
      <small>© 2026 Tienda de Mascotas. Todos los derechos reservados.</small>
    </footer>
  </main>

  <!-- Modal JSON -->
  <div id="modal" class="modal" aria-modal="true" role="dialog">
    <div class="modal-box">
      <div class="modal-head">
        <strong id="modalTitle">JSON</strong>
        <button id="modalClose" class="close-x" aria-label="Cerrar">✕</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const API = "https://petstore3.swagger.io/api/v3";

    // Modal
    const modal = $("modal");
    const modalBody = $("modalBody");
    const modalTitle = $("modalTitle");
    const closeModal = () => modal.classList.remove("open");

    $("modalClose").addEventListener("click", closeModal);
    modal.addEventListener("click", (e) => { if (e.target === modal) closeModal(); });
    document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeModal(); });

    function escapeHtml(v){
      return String(v ?? "")
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;")
        .replace(/'/g,"&#39;");
    }

    function openModalJSON(json){
      modalTitle.textContent = "JSON de respuesta";
      modalBody.innerHTML = `<pre>${escapeHtml(JSON.stringify(json, null, 2))}</pre>`;
      modal.classList.add("open");
    }

    const resultBar = $("resultBar");
    const cardContainer = $("cardContainer");
    const lastResponseRef = { body: null };

    // Delegación para "Ver JSON"
    cardContainer.addEventListener("click", (e) => {
      const btn = e.target.closest('button[data-action="json"]');
      if (!btn) return;
      if (lastResponseRef.body) openModalJSON(lastResponseRef.body);
    });

    $("deleteForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const idVal = Number($("petId").value);
      if (!Number.isFinite(idVal) || idVal <= 0){
        resultBar.style.display = "flex";
        resultBar.innerHTML = `<span class="err">ID inválido</span>`;
        cardContainer.innerHTML = "";
        lastResponseRef.body = null;
        return;
      }

      const url = `${API}/pet/${encodeURIComponent(idVal)}`;
      $("deleteBtn").disabled = true;
      $("deleteBtn").textContent = "Eliminando…";

      try{
        const res = await fetch(url, { method:"DELETE" });
        const text = await res.text();

        let body;
        try { body = JSON.parse(text); }
        catch { body = text; }

        resultBar.style.display = "flex";

        if (res.ok){
          resultBar.innerHTML =
            `<span class="ok">Mascota eliminada correctamente (HTTP ${res.status})</span>` +
            `<span class="note">${escapeHtml(url)}</span>`;

          lastResponseRef.body = body;

          cardContainer.innerHTML = `
            <div class="result-card" role="status" aria-live="polite">
              <h3>Mascota eliminada</h3>
              <p><strong>ID:</strong> ${escapeHtml(idVal)}</p>
              <div class="card-actions">
                <button type="button" class="btn-ghost" data-action="pan class="note">${escapeHtml(url)}</span>`;
          cardContainer.innerHTML = "";
          lastResponseRef.body = null;
        }
      } catch (err){
        resultBar.style.display = "flex";
        resultBar.innerHTML = `<span class="err">Falló la solicitud</span>`;
        cardContainer.innerHTML = "";
        lastResponseRef.body = null;
      } finally {
        $("deleteBtn").disabled = false;
        $("deleteBtn").textContent = "Eliminar mascota";
      }
    });
  </script>
</body>
</html>
