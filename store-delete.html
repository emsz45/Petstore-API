<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Eliminar pedido</title>
    <link rel="icon" type="image/x-icon" href="pets.png">


  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
       :root{
      color-scheme: light;
      --bg: #f7efe5;
      --bg-card: #ffffff;
      --bg-header: #e6d7c3;
      --text: #5a4632;
      --text-muted: #7d6a53;
      --brand: #b99672;
      --brand-dark: #5a4632;
      --border: #e5e7eb;

      --success-bg: #e6f6ec;
      --success-fg: #0a7d34;
      --danger-bg: #fdecec;
      --danger-fg: #a10d11;

      --card-muted: #f4eee7;
    }

    *{ box-sizing: border-box; }
    html, body{ height: 100%; }
    body{
      margin: 0;
      font-family: "Poppins", system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
        /* ✅ Fondo con tu imagen */
  background-image: url("https://www.shutterstock.com/image-vector/dog-paw-bone-seamless-vector-600nw-2465714911.jpg");
  background-repeat: repeat;       /* 🔁 se repite */
  background-size: auto;           /* mantiene el tamaño real */
  background-position: top left;   /* empieza desde la esquina */
    }

    /* ====== Header / Nav (unificado) ====== */
    .header{
      position: sticky; top: 0; z-index: 10;
      background: var(--bg-header);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
      backdrop-filter: saturate(180%) blur(6px);
      padding: .5rem 0;
    }
    .nav{
      max-width: 1200px; margin: 0 auto; padding: .9rem 1rem;
      display: grid; grid-template-columns: 1fr auto; gap: .75rem; align-items: center;
    }
    .brand a{
      font-weight: 700; letter-spacing: .3px; font-size: 1.15rem;
      color: var(--brand-dark); text-decoration: none;
    }
    .brand a:hover{ text-decoration: underline; }

    .links{ display: flex; gap: .5rem; flex-wrap: wrap; align-items: center; }
    .links a{
      text-decoration: none; padding: .55rem .8rem; border-radius: .6rem; font-weight: 600;
      border: 1px solid transparent; transition: transform .12s, box-shadow .2s, background .2s, color .2s;
      background: var(--brand); color: #fff;
      box-shadow: 0 1px 0 rgba(0,0,0,.03);
    }
    .links a:hover{ transform: translateY(-1px); box-shadow: 0 6px 14px rgba(0,0,0,.08); }

    /* ====== Layout principal ====== */
    main{ padding: 1.25rem; }
    @media (min-width: 860px){ main{ padding: 2rem; } }
    .card{
      max-width: 900px; margin: 0 auto;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 8px 20px rgba(0,0,0,.06);
      padding: 1.25rem;
    }
    @media (min-width: 860px){ .card{ padding: 1.5rem; } }

    h1{ margin: 0 0 .35rem; font-size: 1.6rem; }
    @media (min-width: 600px){ h1{ font-size: 1.85rem; } }
    .sub{ color: var(--text-muted); margin: .25rem 0 1rem; }

    /* Formularios */
    fieldset{
      border: 1px solid var(--border); border-radius: 12px; padding: 1rem; background: #fff;
      margin-bottom: 1.25rem;
    }
    legend{ font-weight: 700; padding: 0 .4rem; color: var(--brand-dark); }
    label{ display: block; font-weight: 600; margin-bottom: .35rem; }
    input{
      width: 100%; padding: .65rem .7rem;
      border: 1px solid var(--border); border-radius: .6rem;
      background: #fff; color: var(--text);
      transition: box-shadow .15s ease, border-color .15s ease;
      outline: none; font-size: 1rem;
    }
    input:focus{
      border-color: #d8c6b1; box-shadow: 0 0 0 3px rgba(185,150,114,.25);
    }

    /* Botones */
    .actions{ display: flex; gap: .6rem; flex-wrap: wrap; align-items: center; }
    .btn{
      padding: .7rem 1.05rem; border: 0; border-radius: .7rem; background: var(--brand); color: #fff; cursor: pointer; font-weight: 700;
      box-shadow: 0 4px 10px rgba(185,150,114,.25);
      transition: transform .12s ease, box-shadow .2s ease, background .2s ease;
    }
    .btn:hover{ transform: translateY(-1px); box-shadow: 0 8px 18px rgba(185,150,114,.32); }
    .btn.danger{ background: #b86666; }
    .btn.ghost{ background: transparent; color: var(--brand-dark); border: 1px solid #d8c6b1; }
    .btn:disabled{ opacity: .6; cursor: not-allowed; transform: none; box-shadow: none; }

    /* Barra de estado */
    .bar{
      display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: .75rem; margin: .6rem 0 1rem;
      border: 1px solid var(--border); background: var(--card-muted); border-radius: 12px; padding: .65rem .8rem;
    }
    .ok{ color: var(--success-fg); font-weight: 700; }
    .err{ color: var(--danger-fg); font-weight: 700; }
    .note{ color: var(--text-muted); font-size: .95rem; }

    /* Card resultado */
    .result-card{
      border: 1px solid var(--border); border-radius: 12px; background: #fff;
      padding: 1rem; max-width: 520px; box-shadow: 0 4px 12px rgba(0,0,0,.04);
    }
    .result-card h3{ margin: 0 0 .35rem; }
    .muted{ color: var(--text-muted); }

    /* Footer */
    footer.site{
      max-width: 900px; margin: 1.25rem auto 0;
      background: var(--bg-header); color: var(--text);
      border-top: 1px solid var(--border);
      border-radius: 12px; padding: .9rem 1rem; text-align: center;
    }
    footer small{ opacity: .85; }

    /* Modal */
    .modal{ position: fixed; inset: 0; background: rgba(0,0,0,.5); display: none; align-items: center; justify-content: center; padding: 1rem; z-index: 20; }
    .modal.open{ display: flex; }
    .modal-box{
      background: #fff; border-radius: 14px; width: min(960px,95vw); max-height: 90vh; overflow: auto; box-shadow: 0 8px 30px rgba(0,0,0,.2);
      border: 1px solid var(--border);
    }
    .modal-head{ display: flex; align-items: center; justify-content: space-between; padding: .8rem 1rem; border-bottom: 1px solid var(--border); }
    .modal-body{ padding: 0; }
    .modal-body pre{ margin: 0; padding: 1rem; background: #151212; color: #efeae4; border-radius: 0; overflow: auto; }
    .close-x{ background: transparent; border: 0; font-size: 1.2rem; cursor: pointer; color: var(--brand-dark); }
  </style>
</head>
<body>
  <!-- Header / Nav -->
  <header class="header" role="banner">
    <nav class="nav" aria-label="Navegación principal">
      <div class="brand">
        <a href="main-index.html">Tienda de Mascotas</a>
        
        <img src="icon.png" alt="Icono tienda"
         style="width:38px; height:38px; object-fit:contain;">
      </div>
      <div class="links">
        <!-- ÚNICO BOTÓN: Inventario -->
        <a href="./inventario.html">Inventario</a>
      </div>
    </nav>
  </header>

  <main>
    <div class="card" role="region" aria-labelledby="title">
      <h1 id="title">Eliminar pedido❌</h1>
      <p class="sub">
        Para una respuesta válida, usa IDs <strong>enteros</strong>.<br>
      
      </p>

      <form id="form">
        <fieldset>
          <legend>Parámetro de ruta</legend>
          <label for="orderId">Identificador del Pedido *</label>
          <input id="orderId" name="orderId" type="number" min="1" required placeholder="Ej. 10" />
          <div class="actions" style="margin-top:.75rem">
            <button type="submit" class="btn danger" id="deleteBtn">Eliminar pedido</button>
            <!-- <button type="button" class="btn ghost" id="btnExample">ID de ejemplo</button> -->
            <span id="info" class="note" aria-live="polite"></span>
          </div>
        </fieldset>
      </form>

      <!-- Barra de estado -->
      <div id="bar" class="bar" aria-live="polite" style="display:none">
        <div id="httpStatus"></div>
        <div id="lastUrl" class="note"></div>
      </div>

      <!-- Resultado -->
      <div id="resultCard" class="result-card" style="display:none">
        <h3>Resultado</h3>
        <p id="resultText" class="muted"></p>
        <div class="actions" style="margin-top:.6rem">
          <button type="button" class="btn ghost" id="viewJsonBtn" style="display:none">Ver JSON</button>
        </div>
      </div>
    </div>

    <footer class="site">
      <small>© 2026 Tienda de Mascotas. Todos los derechos reservados.</small>
    </footer>
  </main>

  <!-- Modal -->
  <div id="modal" class="modal" role="dialog" aria-modal="true" aria-label="Detalle JSON">
    <div class="modal-box">
      <div class="modal-head">
        <strong id="modalTitle">JSON</strong>
        <button id="modalClose" class="close-x" aria-label="Cerrar">✕</button>
      </div>
      <div id="modalBody" class="modal-body"></div>
    </div>
  </div>

  <script>
    // ===== Config y utilidades =====
    const API_BASE = "https://petstore3.swagger.io/api/v3/store/order";
    const $ = (id) => document.getElementById(id);

    const form = $("form");
    const inputId = $("orderId");
    const info = $("info");
    const deleteBtn = $("deleteBtn");
    // const btnExample = $("btnExample");

    const bar = $("bar");
    const httpStatus = $("httpStatus");
    const lastUrl = $("lastUrl");

    const resultCard = $("resultCard");
    const resultText = $("resultText");
    const viewJsonBtn = $("viewJsonBtn");

    const modal = $("modal");
    const modalTitle = $("modalTitle");
    const modalBody = $("modalBody");
    $("modalClose").addEventListener("click", closeModal);
    modal.addEventListener("click", (e)=>{ if(e.target===modal) closeModal(); });
    document.addEventListener("keydown", (e)=>{ if(e.key==="Escape") closeModal(); });
    function closeModal(){ modal.classList.remove("open"); modalBody.innerHTML = ""; }
    function openModalJSON(obj, title="JSON"){
      modalTitle.textContent = title;
      const pretty = typeof obj === "string" ? obj : JSON.stringify(obj, null, 2);
      modalBody.innerHTML = '<pre>'+escapeHtml(pretty)+'</pre>';
      modal.classList.add("open");
    }
    function escapeHtml(v){
      return String(v ?? "")
        .replace(/&/g,"&amp;").replace(/</g,"&lt;")
        .replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
    }
    function setBar(ok, statusCode, url){
      bar.style.display = "flex";
      httpStatus.innerHTML = ok ? `<span class="ok">HTTP ${statusCode}</span>` : `<span class="err">HTTP ${statusCode}</span>`;
      lastUrl.textContent = url;
    }


    form.addEventListener("submit", async (e)=>{
      e.preventDefault();
      info.textContent = "";
      resultCard.style.display = "none";
      viewJsonBtn.style.display = "none";

      const idVal = Number(inputId.value);
      if (!Number.isFinite(idVal) || idVal <= 0){
        setBar(false, "—", "");
        info.textContent = "El ID debe ser un entero positivo.";
        return;
      }

      const url = `${API_BASE}/${encodeURIComponent(idVal)}?_=${Date.now()}`; // cache-buster
      setBar(true, "—", url);

      deleteBtn.disabled = true;
      deleteBtn.textContent = "Eliminando…";

      try{
        const res = await fetch(url, { method: "DELETE", headers: { "Accept": "application/json" }, cache: "no-store" });

        // El DELETE puede devolver 200 con cuerpo vacío o JSON; manejamos ambos casos:
        const text = await res.text();
        let body; try{ body = JSON.parse(text); } catch { body = text; }

        setBar(res.ok, res.status, url);

        resultCard.style.display = "block";
        if (res.ok){
          info.textContent = "Pedido eliminado correctamente ✔";
          resultText.textContent = `Se solicitó la eliminación del pedido con ID ${idVal}.`;
          // Si hay body, permite ver JSON
          if (text && text.trim().length){
            viewJsonBtn.style.display = "inline-flex";
            viewJsonBtn.onclick = () => openModalJSON(body, `Respuesta DELETE ${idVal}`);
          }
        } else if (res.status === 404){
          info.textContent = "Pedido no encontrado (404).";
          resultText.textContent = `No existe un pedido con ID ${idVal}.`;
          if (text && text.trim().length){
            viewJsonBtn.style.display = "inline-flex";
            viewJsonBtn.onclick = () => openModalJSON(body, `Error 404`);
          }
        } else if (res.status === 400){
          info.textContent = "ID inválido (400). Recuerda: debe ser entero y < 1000.";
          resultText.textContent = "El identificador no cumple las reglas de la API de demo.";
          if (text && text.trim().length){
            viewJsonBtn.style.display = "inline-flex";
            viewJsonBtn.onclick = () => openModalJSON(body, `Error 400`);
          }
        } else {
          info.textContent = `La API respondió con un error (HTTP ${res.status}).`;
          resultText.textContent = "Revisa el detalle del error.";
          viewJsonBtn.style.display = "inline-flex";
          viewJsonBtn.onclick = () => openModalJSON(body, `Error HTTP ${res.status}`);
        }
      }catch(err){
        setBar(false, "error", url);
        info.textContent = "Falló la solicitud.";
        resultCard.style.display = "block";
        resultText.textContent = "Se produjo una excepción de red o CORS.";
        viewJsonBtn.style.display = "inline-flex";
        viewJsonBtn.onclick = () => openModalJSON(String(err), "Excepción");
      }finally{
        deleteBtn.disabled = false;
        deleteBtn.textContent = "Eliminar pedido";
      }
    });
  </script>
</body>
</html>
